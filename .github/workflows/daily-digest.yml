name: 每日健康知識日報

on:
  schedule:
    - cron: '0 23 * * *'  # 台灣時間每天早上 7:00 (UTC+8 = UTC 23:00 前一天)
  workflow_dispatch:        # 允許手動觸發

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_DESTINATION_USER_ID: ${{ secrets.LINE_DESTINATION_USER_ID }}
        run: node digest.js
